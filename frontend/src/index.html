<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nursery</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="UTTARAKHANDSUCCULENT is a modern plant shopping experience for indoor, outdoor, and medicinal plants."
    />
    <script src="assets/runtime-config.js"></script>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('nursery.theme');
          const resolvedTheme =
            storedTheme === 'dark' || storedTheme === 'light'
              ? storedTheme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
          document.documentElement.dataset.theme = resolvedTheme;
        } catch {}
      })();
    </script>
  </head>
  <body class="bg-seed text-slate-900">
    <app-root></app-root>
  </body>
</html>
